<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>设备点检 - 车间产线记录系统</title>
    <link rel="stylesheet" href="/frontend/css/variables.css">
    <link rel="stylesheet" href="/frontend/css/mobile.css">
    <style>
        /* ---- 点检卡片 ---- */
        .insp-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 10px;
            overflow: hidden;
        }

        .insp-card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
        }

        .insp-card-header .insp-index {
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            background: var(--bg);
            border-radius: 50%;
            flex-shrink: 0;
        }

        .insp-card-header .insp-name {
            flex: 1;
            font-size: 15px;
            font-weight: 500;
            color: var(--text);
            line-height: 1.4;
        }

        .insp-card-header .insp-toggle {
            display: flex;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
            flex-shrink: 0;
        }

        .insp-card-header .insp-toggle button {
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 500;
            border: none;
            background: var(--surface);
            color: var(--text-muted);
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }

        .insp-card-header .insp-toggle button:first-child {
            border-right: 1px solid var(--border);
        }

        .insp-card-header .insp-toggle button.active-ok {
            background: var(--green-bg);
            color: var(--green);
            font-weight: 600;
        }

        .insp-card-header .insp-toggle button.active-bad {
            background: var(--red-bg);
            color: var(--red);
            font-weight: 600;
        }

        .insp-card-footer {
            padding: 0 16px 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .insp-note input {
            width: 100%;
            padding: 8px 10px;
            font-size: 13px;
            color: var(--text);
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            outline: none;
        }

        .insp-note input:focus {
            border-color: var(--red);
        }

        .photo-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .photo-label {
            font-size: 12px;
            color: var(--primary);
            font-weight: 600;
            white-space: nowrap;
        }

        .photo-upload-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 9px 0;
            background: var(--primary-light);
            border: 1px solid var(--primary);
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            color: var(--primary);
            cursor: pointer;
            transition: background 0.15s;
        }

        .photo-upload-btn:active {
            background: var(--primary);
            color: #fff;
        }

        .photo-preview-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .photo-preview-row img {
            width: 44px;
            height: 44px;
            object-fit: cover;
            border-radius: var(--radius-sm);
            border: 1px solid var(--green);
            cursor: pointer;
            flex-shrink: 0;
        }

        .photo-preview-row .photo-ok {
            flex: 1;
            font-size: 13px;
            font-weight: 600;
            color: var(--green);
        }

        .photo-preview-row .retake-btn {
            font-size: 12px;
            padding: 4px 10px;
            white-space: nowrap;
        }

        .insp-empty {
            text-align: center;
            padding: 48px 16px;
            color: var(--text-muted);
            font-size: 14px;
        }

        /* ---- 历史弹窗 ---- */
        .history-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.25s;
            padding: 20px 16px;
        }

        .history-overlay.open {
            pointer-events: auto;
            opacity: 1;
        }

        .history-overlay .history-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
        }

        .history-overlay .history-sheet {
            position: relative;
            background: var(--bg);
            border-radius: var(--radius-lg);
            max-height: calc(100vh - 40px);
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-lg);
            transform: scale(0.95);
            transition: transform 0.25s ease;
            overflow: hidden;
        }

        .history-overlay.open .history-sheet {
            transform: scale(1);
        }

        .history-sheet .hs-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 16px 12px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .history-sheet .hs-header h2 {
            font-size: 17px;
            font-weight: 600;
            margin: 0;
        }

        .history-sheet .hs-close {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            line-height: 1;
        }

        .history-sheet .hs-filter {
            display: flex;
            gap: 8px;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .history-sheet .hs-filter input[type="date"] {
            flex: 1;
            padding: 8px 10px;
            font-size: 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--surface);
            color: var(--text);
            outline: none;
        }

        .history-sheet .hs-filter input[type="date"]:focus {
            border-color: var(--primary);
        }

        .history-sheet .hs-filter button {
            padding: 8px 14px;
            font-size: 13px;
            white-space: nowrap;
        }

        .history-sheet .hs-body {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            -webkit-overflow-scrolling: touch;
        }

        .history-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 10px;
            overflow: hidden;
        }

        .history-item .hi-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .history-item .hi-top:active {
            background: var(--surface-2);
        }

        .history-item .hi-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
            flex-wrap: wrap;
        }

        .history-item .hi-date {
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            font-family: 'DM Mono', monospace;
            white-space: nowrap;
        }

        .history-item .hi-operator {
            font-size: 13px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .history-item .hi-arrow {
            font-size: 14px;
            color: var(--text-dim);
            transition: transform 0.2s;
            flex-shrink: 0;
            margin-left: 8px;
        }

        .history-item.expanded .hi-arrow {
            transform: rotate(90deg);
        }

        .history-item .hi-detail {
            display: none;
            padding: 0 14px 12px;
        }

        .history-item.expanded .hi-detail {
            display: block;
        }

        .history-item .hi-detail-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: var(--surface-2);
            border-radius: var(--radius-sm);
            margin-bottom: 4px;
        }

        .history-item .hi-detail-row:last-child {
            margin-bottom: 0;
        }

        .history-item .hi-detail-name {
            font-size: 13px;
            color: var(--text);
            flex: 1;
        }

        .history-item .hi-detail-note {
            font-size: 12px;
            color: var(--text-muted);
            margin-left: 10px;
        }

        .history-item .hi-detail-photo {
            width: 36px;
            height: 36px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid var(--border);
            cursor: pointer;
            margin-left: 8px;
            flex-shrink: 0;
        }

        .history-item .hi-remark {
            margin-top: 8px;
            padding: 8px 12px;
            background: var(--surface-2);
            border-radius: var(--radius-sm);
            font-size: 12px;
            color: var(--text-muted);
        }

        /* ---- 全屏图片查看器 ---- */
        .img-viewer-overlay {
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: rgba(0, 0, 0, 0.92);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
            overflow: hidden;
        }

        .img-viewer-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .img-viewer-overlay .viewer-close {
            position: fixed;
            top: 12px;
            right: 16px;
            z-index: 2010;
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: #fff;
            font-size: 28px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .img-viewer-overlay .viewer-scroll {
            position: absolute;
            inset: 0;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
        }

        .img-viewer-overlay .viewer-scroll .viewer-img-wrap {
            min-height: 100%;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 52px 0 72px;
        }

        .img-viewer-overlay .viewer-scroll .viewer-img-wrap img {
            display: block;
            max-width: 100%;
            height: auto;
            user-select: none;
            -webkit-user-select: none;
        }

        .img-viewer-overlay .viewer-zoom-btns {
            position: fixed;
            bottom: 28px;
            right: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 2010;
        }

        .img-viewer-overlay .viewer-zoom-btns button {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .img-viewer-overlay .viewer-zoom-btns button:active {
            background: rgba(255, 255, 255, 0.3);
        }

        /* ---- 上传遮罩 ---- */
        .upload-overlay {
            position: fixed;
            inset: 0;
            z-index: 9998;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .upload-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .upload-overlay .upload-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .upload-overlay .upload-text {
            color: #fff;
            font-size: 15px;
            font-weight: 500;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body data-theme="light">

    <div class="header">
        <a href="#" id="backBtn"
            style="position:absolute;left:16px;font-size:20px;color:var(--text);text-decoration:none;">&#8249;</a>
        <h1 class="header-title">设备点检</h1>
    </div>

    <div class="header-machine" id="machineInfo" style="display:none;">
        <span class="machine-code" id="machineCode"></span>
        <span class="machine-name" id="machineName"></span>
    </div>

    <div class="content safe-bottom">
        <div id="inspList">
            <div class="loading" id="inspLoading">
                <div class="loading-spinner"></div>
                <span>加载点检项目...</span>
            </div>
        </div>

        <div id="inspForm" style="display:none;">
            <div class="form-group" style="margin-top:16px;">
                <label class="form-label">点检人员 <span class="required">*</span></label>
                <input type="text" class="form-input" id="operator_name" placeholder="姓名" required>
            </div>
            <div class="form-group">
                <label class="form-label">备注</label>
                <textarea class="form-textarea" id="remark" placeholder="补充说明（选填）" rows="3"></textarea>
            </div>
            <button type="button" class="btn btn-primary" id="submitBtn">提交点检记录</button>
        </div>

        <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border);">
            <button type="button" class="btn btn-ghost" id="historyBtn"
                style="width:100%;font-size:14px;">查看历史记录</button>
        </div>
    </div>

    <!-- 历史记录弹窗 -->
    <div class="history-overlay" id="historyOverlay">
        <div class="history-backdrop" id="historyBackdrop"></div>
        <div class="history-sheet">
            <div class="hs-header">
                <h2>历史点检记录</h2>
                <button class="hs-close" id="historyClose">&times;</button>
            </div>
            <div class="hs-filter">
                <input type="date" id="historyFrom">
                <span style="color:var(--text-muted);font-size:12px;">至</span>
                <input type="date" id="historyTo">
                <button class="btn btn-primary" id="historyQueryBtn">查询</button>
            </div>
            <div class="hs-body" id="historyBody"></div>
        </div>
    </div>

    <!-- 全屏图片查看器 -->
    <div class="img-viewer-overlay" id="imgViewerOverlay">
        <button class="viewer-close" id="viewerClose">&times;</button>
        <div class="viewer-scroll" id="viewerScroll">
            <div class="viewer-img-wrap" id="viewerImgWrap">
                <img id="viewerImg" src="" alt="点检照片">
            </div>
        </div>
        <div class="viewer-zoom-btns">
            <button id="zoomInBtn">+</button>
            <button id="zoomOutBtn">&minus;</button>
        </div>
    </div>

    <!-- 上传遮罩 -->
    <div class="upload-overlay" id="uploadOverlay">
        <div class="upload-spinner"></div>
        <div class="upload-text">正在上传，请勿退出</div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="/frontend/js/api.js?v=7"></script>
    <script src="/frontend/js/mobile-inspection.js?v=7"></script>
</body>

</html>
