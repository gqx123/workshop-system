<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>设备点检 - 车间产线记录系统</title>
    <link rel="stylesheet" href="/frontend/css/variables.css">
    <link rel="stylesheet" href="/frontend/css/mobile.css">
    <style>
        /* 点检项目行 */
        .insp-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 10px;
        }

        .insp-item .insp-index {
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            background: var(--bg);
            border-radius: 50%;
            flex-shrink: 0;
        }

        .insp-item .insp-name {
            flex: 1;
            font-size: 15px;
            font-weight: 500;
            color: var(--text);
        }

        /* 正常/异常切换开关 */
        .insp-toggle {
            display: flex;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
            flex-shrink: 0;
        }

        .insp-toggle button {
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 500;
            border: none;
            background: var(--surface);
            color: var(--text-muted);
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }

        .insp-toggle button:first-child {
            border-right: 1px solid var(--border);
        }

        .insp-toggle button.active-ok {
            background: var(--green-bg);
            color: var(--green);
            font-weight: 600;
        }

        .insp-toggle button.active-bad {
            background: var(--red-bg);
            color: var(--red);
            font-weight: 600;
        }

        /* 异常备注 */
        .insp-note {
            margin-top: 8px;
            margin-left: 38px;
        }

        .insp-note input {
            width: 100%;
            padding: 8px 10px;
            font-size: 13px;
            color: var(--text);
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            outline: none;
        }

        .insp-note input:focus {
            border-color: var(--red);
        }

        /* 空状态 */
        .insp-empty {
            text-align: center;
            padding: 48px 16px;
            color: var(--text-muted);
            font-size: 14px;
        }

            /* ---- 历史记录全屏弹窗 ---- */
        .history-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.25s;
            padding: 20px 16px;
        }

        .history-overlay.open {
            pointer-events: auto;
            opacity: 1;
        }

        .history-overlay .history-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
        }

        .history-overlay .history-sheet {
            position: relative;
            background: var(--bg);
            border-radius: var(--radius-lg);
            max-height: calc(100vh - 40px);
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-lg);
            transform: scale(0.95);
            transition: transform 0.25s ease;
            overflow: hidden;
        }

        .history-overlay.open .history-sheet {
            transform: scale(1);
        }


        .history-sheet .hs-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 16px 12px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .history-sheet .hs-header h2 {
            font-size: 17px;
            font-weight: 600;
            margin: 0;
        }

        .history-sheet .hs-close {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            line-height: 1;
        }

        .history-sheet .hs-filter {
            display: flex;
            gap: 8px;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .history-sheet .hs-filter input[type="date"] {
            flex: 1;
            padding: 8px 10px;
            font-size: 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--surface);
            color: var(--text);
            outline: none;
        }

        .history-sheet .hs-filter input[type="date"]:focus {
            border-color: var(--primary);
        }

        .history-sheet .hs-filter button {
            padding: 8px 14px;
            font-size: 13px;
            white-space: nowrap;
        }

        .history-sheet .hs-body {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            -webkit-overflow-scrolling: touch;
        }

        /* 历史记录项 */
        .history-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 10px;
            overflow: hidden;
        }

        .history-item .hi-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .history-item .hi-top:active {
            background: var(--surface-2);
        }

        .history-item .hi-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
            flex-wrap: wrap;
        }

        .history-item .hi-date {
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            font-family: 'DM Mono', monospace;
            white-space: nowrap;
        }

        .history-item .hi-operator {
            font-size: 13px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .history-item .hi-arrow {
            font-size: 14px;
            color: var(--text-dim);
            transition: transform 0.2s;
            flex-shrink: 0;
            margin-left: 8px;
        }

        .history-item.expanded .hi-arrow {
            transform: rotate(90deg);
        }

        .history-item .hi-detail {
            display: none;
            padding: 0 14px 12px;
        }

        .history-item.expanded .hi-detail {
            display: block;
        }

        .history-item .hi-detail-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: var(--surface-2);
            border-radius: var(--radius-sm);
            margin-bottom: 4px;
        }

        .history-item .hi-detail-row:last-child {
            margin-bottom: 0;
        }

        .history-item .hi-detail-name {
            font-size: 13px;
            color: var(--text);
            flex: 1;
        }

        .history-item .hi-detail-note {
            font-size: 12px;
            color: var(--text-muted);
            margin-left: 10px;
        }

        .history-item .hi-remark {
            margin-top: 8px;
            padding: 8px 12px;
            background: var(--surface-2);
            border-radius: var(--radius-sm);
            font-size: 12px;
            color: var(--text-muted);
        }
    </style>
</head>

<body data-theme="light">

    <div class="header">
        <a href="#" id="backBtn"
            style="position:absolute;left:16px;font-size:20px;color:var(--text);text-decoration:none;">&#8249;</a>
        <h1 class="header-title">设备点检</h1>
    </div>

    <div class="header-machine" id="machineInfo" style="display:none;">
        <span class="machine-code" id="machineCode"></span>
        <span class="machine-name" id="machineName"></span>
    </div>

    <div class="content safe-bottom">
        <!-- 点检项目列表 -->
        <div id="inspList">
            <div class="loading" id="inspLoading">
                <div class="loading-spinner"></div>
                <span>加载点检项目...</span>
            </div>
        </div>

        <!-- 点检人 + 备注 + 提交 -->
        <div id="inspForm" style="display:none;">
            <div class="form-group" style="margin-top:16px;">
                <label class="form-label">点检人员 <span class="required">*</span></label>
                <input type="text" class="form-input" id="operator_name" placeholder="姓名" required>
            </div>

            <div class="form-group">
                <label class="form-label">备注</label>
                <textarea class="form-textarea" id="remark" placeholder="补充说明（选填）" rows="3"></textarea>
            </div>

            <button type="button" class="btn btn-primary" id="submitBtn">提交点检记录</button>
        </div>

        <!-- 查看历史按钮 -->
        <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border);">
            <button type="button" class="btn btn-ghost" id="historyBtn"
                style="width:100%;font-size:14px;">查看历史记录</button>
        </div>
    </div>

    <!-- 历史记录全屏弹窗 -->
    <div class="history-overlay" id="historyOverlay">
        <div class="history-backdrop" id="historyBackdrop"></div>
        <div class="history-sheet">
            <div class="hs-header">
                <h2>历史点检记录</h2>
                <button class="hs-close" id="historyClose">&times;</button>
            </div>
            <div class="hs-filter">
                <input type="date" id="historyFrom">
                <span style="color:var(--text-muted);font-size:12px;">至</span>
                <input type="date" id="historyTo">
                <button class="btn btn-primary" id="historyQueryBtn">查询</button>
            </div>
            <div class="hs-body" id="historyBody"></div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        document.getElementById('backBtn').href =
            '/mobile/?machine_id=' +
            new URLSearchParams(window.location.search).get('machine_id');
    </script>
    <script src="/frontend/js/api.js"></script>
    <script src="/frontend/js/mobile-inspection.js"></script>
</body>

</html>
