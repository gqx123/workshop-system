<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>保养记录 - 车间产线记录系统</title>
  <link rel="stylesheet" href="/frontend/css/variables.css">
  <link rel="stylesheet" href="/frontend/css/mobile.css">
</head>
<body data-theme="light">

  <div class="header">
    <a href="#" id="backBtn" style="position:absolute;left:16px;font-size:20px;color:var(--text);text-decoration:none;">&#8249;</a>
    <h1 class="header-title">保养记录</h1>
  </div>

  <div class="header-machine" id="machineInfo" style="display:none;">
    <span class="machine-code" id="machineCode"></span>
    <span class="machine-name" id="machineName"></span>
  </div>

  <div class="content safe-bottom">
    <form id="recordForm" autocomplete="off">

      <div class="form-group">
        <label class="form-label">操作人员 <span class="required">*</span></label>
        <input type="text" class="form-input" id="operator_name" name="operator_name" placeholder="保养人姓名" required>
      </div>

      <div class="form-group">
        <label class="form-label">工号</label>
        <input type="text" class="form-input" id="operator_id" name="operator_id" placeholder="工号（选填）">
      </div>

      <div class="form-group">
        <label class="form-label">保养类型 <span class="required">*</span></label>
        <select class="form-select" id="maintenance_type" name="maintenance_type" required>
          <option value="">请选择</option>
          <option value="日常保养">日常保养</option>
          <option value="周保养">周保养</option>
          <option value="月保养">月保养</option>
          <option value="季度保养">季度保养</option>
          <option value="年度保养">年度保养</option>
          <option value="临时维修">临时维修</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">保养内容 <span class="required">*</span></label>
        <textarea class="form-textarea" id="description" name="description" placeholder="描述本次保养的具体内容" rows="4" required></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">更换零部件</label>
        <input type="text" class="form-input" id="parts_replaced" name="parts_replaced" placeholder="如有更换请填写（选填）">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">耗时（分钟）</label>
          <input type="number" class="form-input" id="duration_minutes" name="duration_minutes" placeholder="0" min="0">
        </div>
        <div class="form-group">
          <label class="form-label">下次保养日期</label>
          <input type="date" class="form-input" id="next_maintenance_date" name="next_maintenance_date">
        </div>
      </div>

      <button type="submit" class="btn btn-primary" id="submitBtn">提交保养记录</button>

    </form>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    document.getElementById('backBtn').href =
      '/frontend/mobile/?machine_id=' +
      new URLSearchParams(window.location.search).get('machine_id');
  </script>
  <script src="/frontend/js/api.js"></script>
  <script src="/frontend/js/mobile-maintenance.js"></script>
</body>
</html>
