<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作业指导书 - 车间产线记录系统</title>
    <link rel="stylesheet" href="/frontend/css/variables.css">
    <link rel="stylesheet" href="/frontend/css/mobile.css">
    <style>
        body {
            background: #f5f5f5;
        }

        .instr-viewer {
            padding: 12px 16px 24px;
        }

        .instr-viewer img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: var(--radius);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            background: #fff;
            cursor: pointer;
        }

        .instr-empty {
            text-align: center;
            padding: 80px 24px;
            color: var(--text-muted);
        }

        .instr-empty .instr-empty-icon {
            font-size: 56px;
            opacity: 0.25;
            margin-bottom: 16px;
        }

        .instr-empty .instr-empty-text {
            font-size: 15px;
            margin-bottom: 8px;
        }

        .instr-empty .instr-empty-sub {
            font-size: 12px;
            color: var(--text-dim);
        }

        /* 全屏图片查看器 */
        .img-viewer-overlay {
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: rgba(0, 0, 0, 0.92);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
            overflow: hidden;
        }

        .img-viewer-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .img-viewer-overlay .viewer-close {
            position: fixed;
            top: 12px;
            right: 16px;
            z-index: 2010;
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: #fff;
            font-size: 28px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .img-viewer-overlay .viewer-hint {
            position: fixed;
            bottom: 24px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255, 255, 255, 0.45);
            font-size: 13px;
            pointer-events: none;
            transition: opacity 0.6s;
            z-index: 2010;
        }

        /* 滚动容器 */
        .img-viewer-overlay .viewer-scroll {
            position: absolute;
            inset: 0;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* 包裹层：用宽度撑开滚动区域 */
        .img-viewer-overlay .viewer-img-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 0 80px;
        }

        .img-viewer-overlay .viewer-img-wrap img {
            display: block;
            max-width: 100%;
            height: auto;
            user-select: none;
            -webkit-user-select: none;
        }

        .img-viewer-overlay .viewer-zoom-btns {
            position: fixed;
            bottom: 56px;
            right: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 2010;
        }

        .img-viewer-overlay .viewer-zoom-btns button {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .img-viewer-overlay .viewer-zoom-btns button:active {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>

<body data-theme="light">

    <div class="header">
        <a href="#" id="backBtn"
            style="position:absolute;left:16px;font-size:20px;color:var(--text);text-decoration:none;">&#8249;</a>
        <h1 class="header-title">作业指导书</h1>
    </div>

    <div class="header-machine" id="machineInfo" style="display:none;">
        <span class="machine-code" id="machineCode"></span>
        <span class="machine-name" id="machineName"></span>
    </div>

    <div class="instr-viewer" id="instrViewer">
        <div class="loading" id="instrLoading">
            <div class="loading-spinner"></div>
            <span>加载中...</span>
        </div>
    </div>

    <!-- 全屏图片查看器 -->
    <div class="img-viewer-overlay" id="imgViewerOverlay">
        <button class="viewer-close" id="viewerClose">&times;</button>
        <div class="viewer-scroll" id="viewerScroll">
            <div class="viewer-img-wrap" id="viewerImgWrap">
                <img id="viewerImg" src="" alt="作业指导书">
            </div>
        </div>
        <div class="viewer-zoom-btns">
            <button id="zoomInBtn">+</button>
            <button id="zoomOutBtn">&minus;</button>
        </div>
        <div class="viewer-hint" id="viewerHint">双指缩放 · 双击放大 · 滑动查看</div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="/frontend/js/api.js"></script>
    <script>
        (function () {
            'use strict';

            var params = new URLSearchParams(window.location.search);
            var machineId = parseInt(params.get('machine_id'), 10);

            document.getElementById('backBtn').href =
                '/mobile/?machine_id=' + machineId;

            if (!machineId || isNaN(machineId)) {
                showToast('缺少 machine_id 参数', 'error');
                return;
            }

            // 查看器 DOM
            var overlay = document.getElementById('imgViewerOverlay');
            var viewerCloseBtn = document.getElementById('viewerClose');
            var viewerScroll = document.getElementById('viewerScroll');
            var viewerImgWrap = document.getElementById('viewerImgWrap');
            var viewerImg = document.getElementById('viewerImg');
            var viewerHint = document.getElementById('viewerHint');
            var zoomInBtn = document.getElementById('zoomInBtn');
            var zoomOutBtn = document.getElementById('zoomOutBtn');

            // 缩放状态
            var currentScale = 1;
            var minScale = 1;
            var maxScale = 4;
            var startDist = 0;
            var startScale = 1;

            loadMachineInfo();
            loadInstruction();

            // 关闭
            viewerCloseBtn.addEventListener('click', closeViewer);

            // 缩放按钮
            zoomInBtn.addEventListener('click', function () { zoomBy(1.5); });
            zoomOutBtn.addEventListener('click', function () { zoomBy(1 / 1.5); });

            // 双击缩放
            var lastTapTime = 0;
            viewerScroll.addEventListener('touchend', function (e) {
                if (e.touches && e.touches.length > 0) return;
                var now = Date.now();
                if (now - lastTapTime < 300) {
                    if (currentScale > 1.2) {
                        setScale(1);
                    } else {
                        setScale(2.5);
                    }
                    hideHint();
                }
                lastTapTime = now;
            });

            // 双指缩放
            viewerImg.addEventListener('touchstart', function (e) {
                if (e.touches.length === 2) {
                    startDist = getTouchDist(e.touches);
                    startScale = currentScale;
                }
            }, { passive: true });

            viewerImg.addEventListener('touchmove', function (e) {
                if (e.touches.length === 2) {
                    e.preventDefault();
                    var dist = getTouchDist(e.touches);
                    var scale = startScale * (dist / startDist);
                    scale = Math.max(minScale, Math.min(scale, maxScale));
                    setScale(scale);
                    hideHint();
                }
            }, { passive: false });

            // 滑动时隐藏提示
            viewerScroll.addEventListener('touchstart', function () {
                hideHint();
            }, { passive: true });

            function getTouchDist(touches) {
                var dx = touches[0].clientX - touches[1].clientX;
                var dy = touches[0].clientY - touches[1].clientY;
                return Math.sqrt(dx * dx + dy * dy);
            }

            function zoomBy(factor) {
                var newScale = Math.max(minScale, Math.min(currentScale * factor, maxScale));
                setScale(newScale);
                hideHint();
            }

            function setScale(newScale) {
                var scroll = viewerScroll;
                var scrollW = scroll.clientWidth;
                var scrollH = scroll.clientHeight;

                // 记录当前视口中心对应的内容位置（比例）
                var ratioX = (scroll.scrollLeft + scrollW / 2) / (scrollW * currentScale);
                var ratioY = (scroll.scrollTop + scrollH / 2) / (scrollH * currentScale);

                // 应用新缩放
                currentScale = newScale;
                viewerImgWrap.style.width = (scrollW * currentScale) + 'px';
                viewerImgWrap.style.minHeight = (scrollH * currentScale) + 'px';

                // 恢复视口中心对应的内容位置
                scroll.scrollLeft = scrollW * currentScale * ratioX - scrollW / 2;
                scroll.scrollTop = scrollH * currentScale * ratioY - scrollH / 2;
            }

            function hideHint() {
                viewerHint.style.opacity = '0';
            }

            function openViewer(imgUrl) {
                viewerImg.src = imgUrl;
                currentScale = 1;
                viewerHint.style.opacity = '1';
                overlay.classList.add('open');
                viewerImg.onload = function () {
                    var scrollW = viewerScroll.clientWidth;
                    var scrollH = viewerScroll.clientHeight;
                    viewerImgWrap.style.width = scrollW + 'px';
                    viewerImgWrap.style.minHeight = scrollH + 'px';
                    // 滚动到居中位置
                    viewerScroll.scrollTop = (scrollH - viewerScroll.clientHeight) / 2;
                    viewerScroll.scrollLeft = 0;
                };
            }

            function closeViewer() {
                overlay.classList.remove('open');
                viewerImg.src = '';
            }

            async function loadMachineInfo() {
                try {
                    var machine = await API.machines.getById(machineId);
                    document.getElementById('machineCode').textContent = machine.machine_code;
                    document.getElementById('machineName').textContent = machine.machine_name;
                    document.getElementById('machineInfo').style.display = 'flex';
                } catch (err) {
                    showToast('加载机床信息失败: ' + err.message, 'error');
                }
            }

            async function loadInstruction() {
                var viewer = document.getElementById('instrViewer');
                try {
                    var machine = await API.machines.getById(machineId);
                    var hasImage = machine.instruction_image && machine.instruction_image.length > 0;

                    if (hasImage) {
                        var imgUrl = API.baseUrl + '/api/machines/' + machineId + '/instruction/image?t=' + Date.now();
                        viewer.innerHTML = '<img src="' + imgUrl + '" alt="作业指导书" onclick="window.__openInstrViewer(this.src)">';
                        window.__openInstrViewer = openViewer;
                    } else {
                        viewer.innerHTML =
                            '<div class="instr-empty">' +
                            '  <div class="instr-empty-icon">&#128196;</div>' +
                            '  <div class="instr-empty-text">暂无作业指导书</div>' +
                            '  <div class="instr-empty-sub">请联系管理员在后台上传</div>' +
                            '</div>';
                    }
                } catch (err) {
                    viewer.innerHTML =
                        '<div class="instr-empty">' +
                        '  <div class="instr-empty-text" style="color:var(--red);">加载失败</div>' +
                        '  <div class="instr-empty-sub">' + err.message + '</div>' +
                        '</div>';
                }
            }

            function showToast(message, type) {
                type = type || 'success';
                var container = document.getElementById('toastContainer');
                var toast = document.createElement('div');
                toast.className = 'toast toast-' + type;
                toast.textContent = message;
                container.appendChild(toast);
                setTimeout(function () {
                    toast.classList.add('toast-out');
                    toast.addEventListener('animationend', function () { toast.remove(); });
                }, 2000);
            }
        })();
    </script>
</body>

</html>
